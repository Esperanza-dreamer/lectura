    }

      color: transparent;
    }

      font-size: 0.75rem;
      color: #8A7F74;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

      gap: 1.2rem;
      align-items: center;
    }

      border-radius: 40px;
      padding: 0.3rem 0.8rem;
      border: 1px solid #E2DDD4;
      font-size: 0.85rem;
      font-weight: 450;
      cursor: pointer;
      font-family: inherit;
      color: #2C2A29;
      transition: all 0.2s;
    }
    .font-selector:hover {
      border-color: #B7AFA3;
      background-color: #FFFCF8;
    }
    .progress-badge {
      font-size: 0.85rem;
      background: #EBE7E0;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      color: #4A4238;
      font-weight: 450;
    }

      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .book-meta h2 {
      font-size: 1.7rem;
      font-weight: 500;
      letter-spacing: -0.2px;
      color: #1F2E28;
    }
    .book-meta .author {
      font-size: 0.9rem;
      color: #8A7F74;
      margin-top: 0.25rem;
    }
    .chapter-nav {
      display: flex;
      gap: 0.6rem;
    }
    .chapter-btn {

      border: 1px solid #DCD6CD;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 450;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #3A3A36;
    }
    .chapter-btn:hover {
      background: #ffffffcc;
      border-color: #B0A696;
    }
    .reading-area {
      background: #FFFFFF;
      border-radius: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
      padding: 3rem 3.5rem;
      margin-bottom: 2rem;
      transition: all 0.2s;
    }
    .sentence {

      font-size: 1.2rem;
      line-height: 1.8;
      margin: 0.2rem 0;
      cursor: pointer;
      border-radius: 12px;
      padding: 0.1rem 0.2rem;
      transition: background 0.1s ease;
    }
    .sentence:hover {
      background-color: #FDF6E3;
    }
    .translation-tooltip {
      position: absolute;
      background: #2F3E38;
      color: #FEF6E8;
      font-size: 0.9rem;
      line-height: 1.4;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      max-width: 280px;
      white-space: normal;
      word-break: break-word;
      z-index: 120;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      font-family: 'Inter', system-ui, sans-serif;
      transition: opacity 0.15s;
      backdrop-filter: blur(2px);
    }

      content: '';
      position: absolute;
      top: -6px;
      left: 20px;
      width: 12px;
      height: 12px;
      background: #2F3E38;
      transform: rotate(45deg);
      border-radius: 2px;

      margin-bottom: 1.5rem;
    }

      font-size: 0.85rem;
      color: #7F6E5D;

      margin-bottom: 1rem;

      color: #4A5A52;
      letter-spacing: 0.3px;

    }

      border-radius: 20px;
      padding: 0.5rem 1rem;
      border: 1px solid #E9E2D9;
      font-size: 0.85rem;
      font-weight: 450;
      color: #3F3A35;

      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;

      background: #EFF6F2;
      border-color: #C2D4CA;
    }

      width: 8px;
      height: 8px;
      background: #9ABFAD;
      border-radius: 10px;
      display: inline-block;
    }

      .app {
        padding: 1rem;
      }
      .reading-area {
        padding: 1.8rem;
      }
      .sentence {

      }
    }
    .font-serif {
      font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    }
    .font-sans {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
    }
  </style>

          { sentences: [{ spanish: "Es inútil", chinese: "无用" },{ spanish: "callarla.", chinese: "让它沉默。" }] },
          { sentences: [{ spanish: "Es imposible", chinese: "不可能" },{ spanish: "callarla.", chinese: "让它沉默。" }] },
          { sentences: [{ spanish: "Llora monótona", chinese: "它单调地哭泣" },{ spanish: "como llora el agua,", chinese: "像水在哭泣" },{ spanish: "como llora el viento", chinese: "像风在哭泣" },{ spanish: "sobre la nevada.", chinese: "在雪地上。" }] },
          { sentences: [{ spanish: "Es imposible", chinese: "不可能" },{ spanish: "callarla.", chinese: "让它沉默。" }] },
          { sentences: [{ spanish: "Llora por cosas", chinese: "它为远方的事物" },{ spanish: "lejanas.", chinese: "哭泣。" },{ spanish: "Arena del Sur caliente", chinese: "南方炽热的沙" },{ spanish: "que pide camelias blancas.", chinese: "渴求白色的山茶花。" }] },
          { sentences: [{ spanish: "Llora flecha sin blanco,", chinese: "它哭泣没有靶子的箭矢" },{ spanish: "la tarde sin mañana,", chinese: "没有黎明的黄昏" },{ spanish: "y el primer pájaro muerto", chinese: "以及第一只死去的鸟" },{ spanish: "sobre la rama.", chinese: "在枝头。" }] },
          { sentences: [{ spanish: "¡Oh guitarra!", chinese: "哦，吉他！" },{ spanish: "Corazón malherido", chinese: "深受重创的心灵" },{ spanish: "por cinco espadas.", chinese: "被五柄利剑刺穿。" }] }
        ]
      }]
    },
    // ---------------- 帕斯: El Instante ----------------
    "El Instante": {
      author: "Octavio Paz",
      type: "诗歌",
      chapters: [{
        title: "El Instante",
        paragraphs: [
          { sentences: [{ spanish: "Del tiovivo de las horas", chinese: "从时间的旋转木马" },{ spanish: "bajas, amor.", chinese: "你下来，爱人。" }] },
          { sentences: [{ spanish: "Tus pestañas", chinese: "你的睫毛" },{ spanish: "escriben en el aire", chinese: "在空气中书写" },{ spanish: "el nombre de una isla.", chinese: "一座岛屿的名字。" }] },
          { sentences: [{ spanish: "Tu pelo es un incendio.", chinese: "你的头发是一场大火。" },{ spanish: "Tu lengua", chinese: "你的舌头" },{ spanish: "un pez en llamas.", chinese: "一条燃烧的鱼。" }] },
          { sentences: [{ spanish: "El día abre sus alas", chinese: "白昼张开翅膀" },{ spanish: "sobre la plaza.", chinese: "在广场上方。" }] },
          { sentences: [{ spanish: "¡Ay, amor!", chinese: "啊，爱人！" },{ spanish: "Arde el instante.", chinese: "瞬间在燃烧。" }] },
          { sentences: [{ spanish: "Nos vamos a morir,", chinese: "我们终将死去，" },{ spanish: "y éste es el único instante.", chinese: "而这是唯一的瞬间。" }] }
        ]
      }]
    }
  };

  // 读取/初始化进度
  let readingProgress = {};
  for (const [bookName, bookData] of Object.entries(NOVEL_DATA)) {
    readingProgress[bookName] = {
      completedChapters: new Array(bookData.chapters.length).fill(false),
      totalChapters: bookData.chapters.length
    };
  }

  let currentBookId = "瞬息 / El instante";
  let currentChapterIdx = 0;
  let currentFontClass = "font-sans";

  const readingContainer = document.getElementById('readingContainer');
  const prevBtn = document.getElementById('prevChapterBtn');
  const nextBtn = document.getElementById('nextChapterBtn');
  const markBtn = document.getElementById('markChapterBtn');
  const chapterCounterSpan = document.getElementById('chapterCounter');
  const bookTitleSpan = document.getElementById('bookTitle');
  const bookAuthorSpan = document.getElementById('bookAuthor');
  const fontSwitcher = document.getElementById('fontSwitcher');
  const globalProgressBadge = document.getElementById('globalProgressBadge');
  const readingStatusMsg = document.getElementById('readingStatusMsg');
  const bookShelfList = document.getElementById('bookShelfList');

  function updateGlobalProgress() {
    const prog = readingProgress[currentBookId];
    if (!prog) return;
    const completedCount = prog.completedChapters.filter(v => v === true).length;
    const percent = Math.floor((completedCount / prog.totalChapters) * 100);
    globalProgressBadge.innerHTML = `📖 阅读进度 ${percent}% (${completedCount}/${prog.totalChapters}章)`;
    globalProgressBadge.style.background = completedCount === prog.totalChapters ? "#DBE9E2" : "#EBE7E0";
  }

  function renderCurrentChapter() {
    const book = NOVEL_DATA[currentBookId];
    if (!book || !book.chapters[currentChapterIdx]) {
      readingContainer.innerHTML = '<div style="text-align:center; padding:3rem;">📭 章节缺失</div>';
      return;
    }
    const chapter = book.chapters[currentChapterIdx];
    readingContainer.innerHTML = '';
    readingContainer.className = `reading-area ${currentFontClass}`;

    for (const para of chapter.paragraphs) {
      const pDiv = document.createElement('div');
      pDiv.className = 'paragraph';
      for (const sent of para.sentences) {
        const span = document.createElement('span');
        span.className = 'sentence';
        span.setAttribute('data-spanish', sent.spanish);
        span.setAttribute('data-chinese', sent.chinese);
        span.textContent = sent.spanish + ' ';
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          showTranslationTooltip(e, sent.chinese);
        });
        pDiv.appendChild(span);
      }
      readingContainer.appendChild(pDiv);
    }

    const chapterTitle = chapter.title || `第${currentChapterIdx+1}部分`;
    chapterCounterSpan.innerText = `${chapterTitle}`;
    const isCompleted = readingProgress[currentBookId]?.completedChapters[currentChapterIdx] || false;
    if (isCompleted) {
      markBtn.classList.add('completed');
      markBtn.innerHTML = '✅ 本章已完成';
    } else {
      markBtn.classList.remove('completed');
      markBtn.innerHTML = '📖 标记本章读完';
    }
    readingContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateGlobalProgress();
    renderBookShelf();
  }

  let activeTooltip = null;
  function showTranslationTooltip(event, chineseText) {
    if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; }
    const targetSpan = event.currentTarget;
    const rect = targetSpan.getBoundingClientRect();
    const tooltip = document.createElement('div');
    tooltip.className = 'translation-tooltip';
    tooltip.textContent = chineseText;
    document.body.appendChild(tooltip);
    const tooltipRect = tooltip.getBoundingClientRect();
    let left = rect.left + window.scrollX;
    let top = rect.bottom + window.scrollY + 8;
    if (left + tooltipRect.width > window.innerWidth - 20) left = window.innerWidth - tooltipRect.width - 20;
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
    activeTooltip = tooltip;
    const removeListener = (e) => {
      if (activeTooltip && !activeTooltip.contains(e.target) && e.target !== targetSpan) {
        activeTooltip.remove(); activeTooltip = null; document.removeEventListener('click', removeListener);
      }
    };
    setTimeout(() => document.addEventListener('click', removeListener), 50);
    setTimeout(() => { if(activeTooltip){ activeTooltip.remove(); activeTooltip = null; } }, 2500);
  }

  function markCurrentChapterComplete() {
    const progress = readingProgress[currentBookId];
    if (!progress) return;
    if (progress.completedChapters[currentChapterIdx]) {
      readingStatusMsg.innerText = '📌 本章之前已经标记过啦！';
      setTimeout(() => { readingStatusMsg.innerText = '✨ 点击诗句即可查看中文翻译'; }, 1500);
      return;
    }
    progress.completedChapters[currentChapterIdx] = true;
    saveProgressToLocal();
    markBtn.classList.add('completed');
    markBtn.innerHTML = '✅ 本章已完成';
    readingStatusMsg.innerText = '🎉 章节进度已更新！继续阅读吧。';
    setTimeout(() => { readingStatusMsg.innerText = '✨ 点击诗句即可查看中文翻译'; }, 2000);
    updateGlobalProgress();
    renderBookShelf();
    const allCompleted = progress.completedChapters.every(v => v === true);
    if (allCompleted) {
      readingStatusMsg.innerText = `🏆 恭喜！《${currentBookId}》已全部读完！`;
      setTimeout(() => { readingStatusMsg.innerText = '✨ 点击诗句即可查看中文翻译'; }, 3000);
    }
  }

  function prevChapter() {
    if (currentChapterIdx > 0) { currentChapterIdx--; renderCurrentChapter(); }
    else { readingStatusMsg.innerText = '已经是第一部分'; setTimeout(() => { readingStatusMsg.innerText = '✨ 点击诗句即可查看中文翻译'; }, 800); }
  }
  function nextChapter() {
    const maxIdx = NOVEL_DATA[currentBookId].chapters.length - 1;
    if (currentChapterIdx < maxIdx) { currentChapterIdx++; renderCurrentChapter(); }
    else { readingStatusMsg.innerText = '🎯 已是最后一部分，试试其他作品吧~'; setTimeout(() => { readingStatusMsg.innerText = '✨ 点击诗句即可查看中文翻译'; }, 1500); }
  }

  function switchBook(bookName) {
    if (currentBookId === bookName) return;
    currentBookId = bookName;
    currentChapterIdx = 0;
    if (!readingProgress[bookName]) {
      readingProgress[bookName] = {
        completedChapters: new Array(NOVEL_DATA[bookName].chapters.length).fill(false),
        totalChapters: NOVEL_DATA[bookName].chapters.length
      };
    }
    bookTitleSpan.innerText = bookName;
    bookAuthorSpan.innerText = NOVEL_DATA[bookName].author;
    renderCurrentChapter();
    updateGlobalProgress();
  }

  function saveProgressToLocal() {
    localStorage.setItem('lectura_espe_progress', JSON.stringify(readingProgress));
    localStorage.setItem('lectura_espe_last_book', currentBookId);
    localStorage.setItem('lectura_espe_last_chapter', currentChapterIdx);
  }

  function loadProgressFromLocal() {
    const saved = localStorage.getItem('lectura_espe_progress');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        for (const [bk, val] of Object.entries(parsed)) {
          if (readingProgress[bk]) readingProgress[bk].completedChapters = val.completedChapters;
        }
      } catch(e) {}
    }
    const lastBook = localStorage.getItem('lectura_espe_last_book');
    if (lastBook && NOVEL_DATA[lastBook]) {
      currentBookId = lastBook;
      const lastChap = parseInt(localStorage.getItem('lectura_espe_last_chapter'));
      if (!isNaN(lastChap) && lastChap < NOVEL_DATA[currentBookId].chapters.length) currentChapterIdx = lastChap;
    }
  }

  // 按作家分组渲染书桌
  function renderBookShelf() {
    const grouped = {};
    for (const [bookName, bookData] of Object.entries(NOVEL_DATA)) {
      const author = bookData.author;
      if (!grouped[author]) grouped[author] = [];
      grouped[author].push({ name: bookName, data: bookData });
    }
    bookShelfList.innerHTML = '';
    for (const [author, works] of Object.entries(grouped)) {
      let authorCompleted = 0, authorTotal = 0;
      for (const w of works) {
        const prog = readingProgress[w.name];
        authorCompleted += prog ? prog.completedChapters.filter(c=>c===true).length : 0;
        authorTotal += prog ? prog.totalChapters : 0;
      }
      const percent = authorTotal ? Math.floor((authorCompleted/authorTotal)*100) : 0;
      const groupDiv = document.createElement('div');
      groupDiv.className = 'author-group';
      groupDiv.innerHTML = `
        <div class="author-group-header" data-author="${author}">
          <span class="toggle-icon">▼</span>
          <h3>${author}</h3>
          <span class="group-progress">${percent}% · ${authorCompleted}/${authorTotal}</span>
        </div>
        <div class="author-works" id="works-${author.replace(/\s/g, '')}"></div>
      `;
      const worksContainer = groupDiv.querySelector(`.author-works`);
      for (const w of works) {
        const prog = readingProgress[w.name];
        const completedCount = prog ? prog.completedChapters.filter(c=>c===true).length : 0;
        const totalCh = w.data.chapters.length;
        const allRead = completedCount === totalCh;
        const card = document.createElement('div');
        card.className = `book-card ${allRead ? 'read-status' : ''}`;
        card.innerHTML = `<span class="status-dot" style="background: ${allRead ? '#4C9F70' : '#D9CBBF'}"></span><span style="font-weight:500;">${w.name}</span><span style="font-size:0.7rem; color:#776B5D;">${completedCount}/${totalCh}</span>${allRead ? '<span style="font-size:0.7rem;"> ✨</span>' : ''}`;
        card.addEventListener('click', () => switchBook(w.name));
        worksContainer.appendChild(card);
      }
      const header = groupDiv.querySelector('.author-group-header');
      let collapsed = false;
      header.addEventListener('click', () => {
        collapsed = !collapsed;
        if (collapsed) {
          worksContainer.classList.add('collapsed');
          header.querySelector('.toggle-icon').innerHTML = '▶';
        } else {
          worksContainer.classList.remove('collapsed');
          header.querySelector('.toggle-icon').innerHTML = '▼';
        }
      });
      bookShelfList.appendChild(groupDiv);
    }
  }

  function setFontClass(className) { currentFontClass = className; renderCurrentChapter(); }
  fontSwitcher.addEventListener('change', (e) => setFontClass(e.target.value));
  prevBtn.addEventListener('click', prevChapter);
  nextBtn.addEventListener('click', nextChapter);
  markBtn.addEventListener('click', markCurrentChapterComplete);
  loadProgressFromLocal();
  bookTitleSpan.innerText = currentBookId;
  bookAuthorSpan.innerText = NOVEL_DATA[currentBookId].author;
  renderCurrentChapter();
  renderBookShelf();
  updateGlobalProgress();
  window.addEventListener('beforeunload', () => saveProgressToLocal());
</script>
</body>
</html>
